<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattlePrice - Cadastro</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<header>
    <h1>
        <img src="iconecarrinho.png" alt="Logo do BattlePrice" class="logo">
        BattlePrice 
    </h1>
    
    <nav class="header-links">
        <a href="#">Contato</a>
        <a href="#">Apoie</a>
    </nav>
</header>

<body>
    <main> 
        <div class="container-central-login">
            <h2>Cadastro</h2>
            <form>
                <input type="text" placeholder="Nome">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Senha">
                <button type="submit"  >Cadastrar</button>
            </form>
        </div>
    </main>
<footer>
    <div class="footer-logo">
        <img src="iconecarrinho.png" alt="Logo do BattlePrice" class="logofooter">
        <span>BattlePrice</span>
    </div>

    <nav class="footer-links">
        <a href="#">GitHub</a>
        <a href="#">Termos De Uso</a>
    </nav>
</footer>

</body>
</html>
