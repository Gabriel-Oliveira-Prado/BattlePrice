<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattlePrice - Jogo</title>
   
    <link rel="shortcut icon" href="Iconecarrinho.png" type="image/x-icon"> 
    <link rel="stylesheet" href="/src/style.css">
    
</head>
<body>
<header>
    <h1>
        <img src="iconecarrinho.png" alt="Logo do BattlePrice" class="logo">
        BattlePrice 
    </h1>
    
    <nav class="header-links">
        <a href="login.html">Login</a>
        <a href="cadastro.html">Entrar</a>
    </nav>
</header>

<main class="container-central">

    <div id="tela-inicial">
        <h2 class="titulo-principal">
            <span class="metade-amarela">Battle</span><span class="metade-verde">Price</span>
        </h2>
        <p id="mensagem-inicial">clique em qualquer lugar para começar!</p>
    </div>
    
    <div id="tela-jogo" class="escondido">
    
    <div class="caixa-contador">
        <p id="contador-chances" style="padding: 0; margin-bottom: 10px;"></p>
    </div>

    <div class="conteudo-jogo">
        <div class="caixa-imagem-api">
            <img src=" " alt="Item do Jogo" id="imagem-produto">
        </div>

        <div class="caixa-palpite">
            <h3>Qual é o preço deste item?</h3>
            <input type="number" id="palpite-usuario" placeholder="Digite o valor em R$">
            <button id="btn-chutar">Chutar Preço</button>
        </div>
    </div>

</div>

</main>
<footer>
    <div class="footer-logo">
        <img src="iconecarrinho.png" alt="Logo do BattlePrice" class="logofooter">
        <span>BattlePrice</span>
    </div>

    <nav class="footer-links">
        <a href="#">GitHub</a>
        <a href="#">Termos De Uso</a>
    </nav>
</footer>
 <script type="module" src="/src/main.js"></script>  
</body>
</html>
